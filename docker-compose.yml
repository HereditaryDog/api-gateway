version: '3.8'

services:
  app:
    build: .
    container_name: api-gateway
    restart: always
    ports:
      - "${PORT:-8080}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/apigateway
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./data:/app/data
    depends_on:
      - db
      - redis
    networks:
      - api-gateway

  db:
    image: postgres:15-alpine
    container_name: api-gateway-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=apigateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api-gateway

  redis:
    image: redis:7-alpine
    container_name: api-gateway-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - api-gateway

  # 可选: Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: api-gateway-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - api-gateway

volumes:
  postgres_data:
  redis_data:

networks:
  api-gateway:
    driver: bridge
