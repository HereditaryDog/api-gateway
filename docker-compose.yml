services:
  app:
    build: .
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PLATFORM_URL: ${PLATFORM_URL:-http://localhost:${PORT:-8080}}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - api-gateway

  db:
    image: postgres:15-alpine
    container_name: api-gateway-db
    restart: unless-stopped
    profiles:
      - infra
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apigateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api-gateway

  redis:
    image: redis:7-alpine
    container_name: api-gateway-redis
    restart: unless-stopped
    profiles:
      - infra
    volumes:
      - redis_data:/data
    networks:
      - api-gateway

  # 可选: Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: api-gateway-nginx
    restart: unless-stopped
    profiles:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      app:
        condition: service_healthy
    networks:
      - api-gateway

volumes:
  postgres_data:
  redis_data:

networks:
  api-gateway:
    driver: bridge
